apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hello-kubernetes-httproute-path
spec:
  parentRefs:
  - name: eg # Hacemos referencia un gateway llamado "eg", que ya deberíamos tener creado
  hostnames:
  - "cursok8s.localhost"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /hw1
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /
    backendRefs:
    - name: hello-kubernetes-first
      port: 8080
  - matches:
    - path:
        type: PathPrefix
        value: /hw2
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /
    backendRefs:
    - name: hello-kubernetes-second
      port: 8080
