apiVersion: v1
kind: Pod
metadata:
  name: load-generator
spec:
  restartPolicy: Never
  containers:
  - name: load-generator
    image: busybox
    # Bombardea el servicio para que VPA observe consumo real y ajuste los requests.
    command:
    - /bin/sh
    - -c
    - "while true; do wget -q -O- http://php-apache; done"
