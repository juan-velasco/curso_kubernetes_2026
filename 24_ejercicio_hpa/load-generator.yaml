apiVersion: v1
kind: Pod
metadata:
  name: load-generator
spec:
  restartPolicy: Never
  containers:
  - name: load-generator
    image: busybox
    # Bombardea el servicio php-apache con peticiones en bucle infinito.
    # Aplicar este pod dispara el escalado; eliminarlo detiene la carga y provoca el escalado a la baja.
    command:
    - /bin/sh
    - -c
    - "while true; do wget -q -O- http://php-apache; done"
